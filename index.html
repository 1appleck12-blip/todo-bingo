<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>やることノート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#2C3C63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="やることノート">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="manifest" id="manifestLink">
<script>
  (function(){
    const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">'
      + '<rect width="200" height="200" rx="36" fill="#2C3C63"/>'
      + '<circle cx="100" cy="100" r="58" fill="none" stroke="#B5392C" stroke-width="10"/>'
      + '<text x="100" y="120" font-family="serif" font-size="56" fill="#B5392C" text-anchor="middle" font-weight="700">印</text>'
      + '</svg>';
    const iconDataUri = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
    document.getElementById('appleIcon').setAttribute('href', iconDataUri);

    const manifest = {
      name: 'やることノート',
      short_name: 'ノート',
      start_url: '.',
      display: 'standalone',
      background_color: '#F7F2E7',
      theme_color: '#2C3C63',
      icons: [{ src: iconDataUri, sizes: '200x200', type: 'image/svg+xml' }]
    };
    const manifestUri = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
    document.getElementById('manifestLink').setAttribute('href', manifestUri);

    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {
          // プレビュー環境やfile://では登録できない。実際にホスティングした際に有効になる。
        });
      });
    }
  })();
</script>
<style>
  :root{
    --paper:#F7F2E7;
    --paper-dark:#EAE2CF;
    --ink:#272320;
    --ink-soft:#6b6258;
    --indigo:#2C3C63;
    --indigo-soft:#5b6c92;
    --vermillion:#B5392C;
    --vermillion-soft:#c97b6e;
    --gold:#B0892F;
    --line:#d8cdb2;
  }

  *{box-sizing:border-box;}

  html, body{
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(176,137,47,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(44,60,99,0.06), transparent 40%),
      var(--paper);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px 60px;
  }

  .app{
    width:100%;
    max-width:480px;
  }

  header{
    margin-bottom:22px;
  }

  .header-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:6px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    color:var(--ink-soft);
  }

  .bingo-badge{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--vermillion);
    border:1px solid var(--vermillion-soft);
    border-radius:999px;
    padding:4px 10px 4px 8px;
    background:rgba(181,57,44,0.06);
  }

  .bingo-badge .count{
    font-size:15px;
    font-weight:700;
  }

  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:30px;
    margin:2px 0 8px;
    letter-spacing:0.02em;
  }

  .subtitle{
    font-size:13px;
    line-height:1.7;
    color:var(--ink-soft);
    margin:0;
  }

  .tabbar{
    display:flex;
    gap:6px;
    margin-bottom:22px;
    overflow-x:auto;
    padding-bottom:2px;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }

  .tabbar::-webkit-scrollbar{ display:none; }

  .tab-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    white-space:nowrap;
    flex:none;
    padding:8px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  .tab-btn.active{
    background:var(--indigo);
    border-color:var(--indigo);
    color:var(--paper);
  }

  .tab-btn:active{
    transform:scale(0.94);
  }

  .tab-panel{
    display:none;
  }

  .tab-panel.active{
    display:block;
  }

  .panel-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }

  .panel-title{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:18px;
  }

  .todo-input-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }

  .todo-input-row input{
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:14px;
    background:#fffdf8;
    outline:none;
    color:var(--ink);
  }

  .todo-input-row input:focus{
    border-color:var(--indigo-soft);
  }

  .add-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    color:var(--paper);
    background:var(--indigo);
    border:none;
    border-radius:8px;
    padding:0 16px;
    cursor:pointer;
    flex:none;
    transition:transform 0.15s ease;
  }

  .add-btn:active{
    transform:scale(0.93);
  }

  .todo-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    min-height:8px;
  }

  .todo-row{
    display:flex;
    align-items:center;
    gap:10px;
    background:#fffdf8;
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 10px;
    transition:border-color 0.2s ease;
  }

  .todo-row.done{
    border-color:#e2d9be;
  }

  .todo-stamp-wrap{
    width:30px;
    height:30px;
    flex:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .stamp-btn.small{
    position:static;
    width:24px;
    height:24px;
    margin:0;
    font-size:10px;
  }

  .stamp-mark.small{
    position:static;
    width:30px;
    height:30px;
    margin:0;
    font-size:13px;
  }

  .todo-text{
    flex:1;
    font-size:13px;
    line-height:1.5;
    word-break:break-word;
  }

  .todo-row.done .todo-text{
    color:var(--ink-soft);
    text-decoration:line-through;
    text-decoration-color:var(--vermillion-soft);
  }

  .todo-del{
    flex:none;
    width:26px;
    height:26px;
    border-radius:50%;
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:16px;
    line-height:1;
    cursor:pointer;
    transition:color 0.15s ease, transform 0.15s ease;
  }

  .todo-del:hover{
    color:var(--vermillion);
  }

  .todo-del:active{
    transform:scale(0.85);
  }

  .todo-empty-hint{
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    padding:24px 0;
    opacity:0.65;
  }

  .todo-footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:14px;
  }

  .todo-count{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  .board-wrap{
    position:relative;
    margin-top:4px;
  }

  .size-switcher{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }

  .size-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    padding:5px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:background 0.2s ease, border-color 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  .size-btn.active{
    background:var(--indigo);
    border-color:var(--indigo);
    color:var(--paper);
  }

  .size-btn:active{
    transform:scale(0.92);
  }

  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    aspect-ratio:1/1;
  }

  .lines-overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
  }

  .lines-overlay path{
    fill:none;
    stroke:var(--indigo);
    stroke-width:1.6;
    stroke-linecap:round;
    opacity:0;
    transition:stroke-dashoffset 0.65s cubic-bezier(.2,.8,.2,1), opacity 0.2s ease;
  }

  .lines-overlay path.achieved{
    opacity:0.85;
  }

  .cell{
    position:relative;
    border-radius:8px;
    background:#fffdf8;
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:border-color 0.25s ease, background 0.25s ease;
  }

  .cell.empty{
    background:transparent;
    border:1.5px dashed var(--line);
    align-items:center;
    justify-content:center;
    cursor:text;
    color:var(--ink-soft);
  }

  .cell.empty:hover{
    border-color:var(--indigo-soft);
    color:var(--indigo);
  }

  .cell.empty:active, .cell-text:active{
    transform:scale(0.97);
  }

  .empty-hint{
    font-size:12px;
    text-align:center;
    line-height:1.6;
    padding:8px;
    pointer-events:none;
  }

  .empty-hint .plus{
    font-size:20px;
    display:block;
    margin-bottom:2px;
    font-family:'JetBrains Mono', monospace;
  }

  .cell textarea{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
    resize:none;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:13px;
    line-height:1.55;
    padding:10px;
    color:var(--ink);
    outline:none;
  }

  .cell-text{
    flex:1;
    padding:10px 10px 6px;
    font-size:13px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
    cursor:text;
  }

  .cell.done .cell-text{
    color:var(--ink-soft);
  }

  .stamp-btn{
    align-self:flex-end;
    margin:0 6px 6px auto;
    width:26px;
    height:26px;
    border-radius:50%;
    border:1.4px solid var(--indigo-soft);
    background:transparent;
    color:var(--indigo-soft);
    font-size:11px;
    font-family:'JetBrains Mono', monospace;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .stamp-btn:hover{
    border-color:var(--indigo);
    color:var(--indigo);
    transform:scale(1.08);
  }

  .stamp-btn:active{
    transform:scale(0.88);
  }

  .stamp-mark{
    position:absolute;
    top:50%;
    right:10px;
    width:46px;
    height:46px;
    margin-top:-23px;
    border:2.5px solid var(--vermillion);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--vermillion);
    font-family:'Shippori Mincho', serif;
    font-size:18px;
    font-weight:700;
    transform:rotate(-10deg) scale(0);
    opacity:0;
    transition:transform 0.32s cubic-bezier(.34,1.56,.64,1), opacity 0.2s ease;
    cursor:pointer;
    background:rgba(181,57,44,0.04);
  }

  .cell.done .stamp-mark{
    transform:rotate(-10deg) scale(1);
    opacity:1;
  }

  .stamp-mark:active{
    transform:rotate(-10deg) scale(0.9) !important;
  }

  .cell.done .stamp-btn{
    display:none;
  }

  .cell.done{
    border-color:#e2d9be;
  }

  footer{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .reset-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    background:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 18px;
    cursor:pointer;
    transition:border-color 0.2s ease, color 0.2s ease;
  }

  .reset-btn:hover{
    border-color:var(--vermillion-soft);
    color:var(--vermillion);
  }

  .reset-btn:active{
    transform:scale(0.96);
  }

  .save-note{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.75;
    text-align:center;
    min-height:14px;
  }

  .install-note{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.6;
    text-align:center;
    max-width:320px;
    line-height:1.6;
  }


  .numbered-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:12px;
    min-height:8px;
  }

  .numbered-row{
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:8px 10px;
    background:#fffdf8;
    border:1px solid var(--line);
    border-radius:8px;
    transition:border-color 0.2s ease, opacity 0.2s ease;
  }

  .numbered-row.done{
    border-color:#e2d9be;
    opacity:0.7;
  }

  .numbered-num{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--gold);
    min-width:20px;
    padding-top:2px;
    flex:none;
    font-weight:700;
  }

  .numbered-row.done .numbered-num{
    color:var(--ink-soft);
  }

  .numbered-text{
    flex:1;
    font-size:13px;
    line-height:1.55;
    word-break:break-word;
    padding-top:1px;
  }

  .numbered-row.done .numbered-text{
    color:var(--ink-soft);
    text-decoration:line-through;
    text-decoration-color:var(--vermillion-soft);
  }

  .numbered-done-btn{
    flex:none;
    width:24px;
    height:24px;
    border-radius:50%;
    border:1.4px solid var(--indigo-soft);
    background:transparent;
    color:var(--indigo-soft);
    font-size:10px;
    font-family:'JetBrains Mono', monospace;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease, border-color 0.15s ease;
  }

  .numbered-done-btn:active{ transform:scale(0.85); }

  .numbered-row.done .numbered-done-btn{
    border-color:var(--vermillion);
    color:var(--vermillion);
    font-size:13px;
  }

  .numbered-del{
    flex:none;
    width:22px;
    height:22px;
    border-radius:50%;
    border:none;
    background:none;
    color:var(--ink-soft);
    font-size:15px;
    line-height:1;
    cursor:pointer;
    transition:color 0.15s ease, transform 0.15s ease;
    padding-top:1px;
  }

  .numbered-del:hover{ color:var(--vermillion); }
  .numbered-del:active{ transform:scale(0.85); }

  .numbered-add-row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }

  .numbered-add-row input{
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:14px;
    background:#fffdf8;
    outline:none;
    color:var(--ink);
  }

  .numbered-add-row input:focus{ border-color:var(--indigo-soft); }

  .numbered-empty-hint{
    font-size:12px;
    color:var(--ink-soft);
    text-align:center;
    padding:20px 0;
    opacity:0.65;
  }


  .deadline-input-block{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:14px;
  }

  .deadline-input-block .todo-input-row{
    margin-bottom:0;
  }

  .deadline-date-row{
    display:flex;
    align-items:center;
    gap:8px;
  }

  .deadline-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    flex:none;
  }

  input[type="date"]{
    flex:1;
    border:1px solid var(--line);
    border-radius:8px;
    padding:9px 10px;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:14px;
    background:#fffdf8;
    outline:none;
    color:var(--ink);
    -webkit-appearance:none;
  }

  input[type="date"]:focus{
    border-color:var(--indigo-soft);
  }

  .deadline-chip{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    padding:2px 7px;
    border-radius:999px;
    border:1px solid var(--line);
    color:var(--ink-soft);
    white-space:nowrap;
    margin-top:3px;
  }

  .deadline-chip.overdue{
    border-color:var(--vermillion-soft);
    color:var(--vermillion);
    background:rgba(181,57,44,0.06);
  }

  .deadline-chip.soon{
    border-color:var(--gold);
    color:var(--gold);
    background:rgba(176,137,47,0.06);
  }

  .todo-text-wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:2px;
  }


  /* ---- エンタメ ---- */
  .entame-input-block{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }

  .entame-cat-row{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
  }

  .cat-btn{
    font-size:12px;
    padding:5px 11px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:background 0.18s, border-color 0.18s, color 0.18s, transform 0.12s;
    white-space:nowrap;
  }

  .cat-btn.active{
    background:var(--indigo);
    border-color:var(--indigo);
    color:var(--paper);
  }

  .cat-btn:active{ transform:scale(0.92); }

  .entame-filter-row{
    display:flex;
    gap:5px;
    overflow-x:auto;
    padding-bottom:2px;
    margin-bottom:12px;
    -ms-overflow-style:none;
    scrollbar-width:none;
  }

  .entame-filter-row::-webkit-scrollbar{ display:none; }

  .filter-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    padding:4px 11px;
    border-radius:999px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    flex:none;
    transition:background 0.18s, border-color 0.18s, color 0.18s, transform 0.12s;
  }

  .filter-btn.active{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--paper);
  }

  .filter-btn:active{ transform:scale(0.92); }

  .entame-cat-tag{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    padding:2px 7px;
    border-radius:999px;
    margin-right:6px;
    flex:none;
  }

  .cat-tag-映画 { background:rgba(44,60,99,0.12); color:var(--indigo); }
  .cat-tag-ドラマ{ background:rgba(176,137,47,0.12); color:var(--gold); }
  .cat-tag-本    { background:rgba(181,57,44,0.10); color:var(--vermillion); }
  .cat-tag-アニメ{ background:rgba(90,140,100,0.12); color:#3a7a4a; }
  .cat-tag-その他{ background:rgba(107,98,88,0.10); color:var(--ink-soft); }

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--indigo);
    color:var(--paper);
    font-family:'Shippori Mincho', serif;
    font-size:14px;
    padding:10px 22px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s ease;
    letter-spacing:0.04em;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .confetti-piece{
    position:absolute;
    left:50%;
    top:38%;
    pointer-events:none;
  }

  @keyframes confetti-burst{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0; }
  }

  .backup-block{
    margin-top:6px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:100%;
  }

  .backup-buttons{
    display:flex;
    gap:8px;
  }

  #backupArea{
    display:none;
    width:100%;

<body>

      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="映画">映画</button>

      <button class="filter-btn" data-filter="本">本</button>

      <span></span>

  <p class="install-note">スマホのChromeで開いて、右上のメニューから「ホーム画面に追加」を選ぶとアプリのように開けます</p>

  <div class="backup-block">
    <div class="backup-buttons">
      <button class="reset-btn" id="exportBtn">データを書き出す</button>

    </div>
    <textarea id="backupArea" placeholder="ここに貼り付けて「データを読み込む」をもう一度押してください"></textarea>
    <p class="save-note" id="backupStatus"></p>
  </div>
</div>

<div class="toast" id="toast">ビンゴ!</div>

<script>
  // ---- ビンゴ ----
  const BINGO_SIZE_KEY = 'bingo-size';
  const BINGO_DATA_KEY = (n) => `board-state-${n}x${n}`;

  let gridSize = 3;
  let cellsData = [];
  let lastAchieved = 0;

  const board = document.getElementById('board');
  const bingoCountEl = document.getElementById('bingoCount');
  const toast = document.getElementById('toast');
  const linesSvg = document.getElementById('linesSvg');
  const saveStatus = document.getElementById('saveStatus');

  function buildLines(n){
    const lines = [];
    for(let r=0;r<n;r++){
      const row=[];
      for(let c=0;c<n;c++) row.push(r*n+c);
      lines.push(row);
    }
    for(let c=0;c<n;c++){
      const col=[];
      for(let r=0;r<n;r++) col.push(r*n+c);
      lines.push(col);
    }
    const d1=[],d2=[];
    for(let i=0;i<n;i++){ d1.push(i*n+i); d2.push(i*n+(n-1-i)); }
    lines.push(d1,d2);
    return lines;
  }

  function buildSvgLines(n){
    linesSvg.innerHTML='';
    const lines=buildLines(n);
    const step=100/n;
    const centers=Array.from({length:n},(_,i)=>step*(i+0.5));
    lines.forEach((combo,i)=>{
      const a=combo[0],z=combo[combo.length-1];
      const r0=Math.floor(a/n),c0=a%n;
      const r2=Math.floor(z/n),c2=z%n;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M ${centers[c0]} ${centers[r0]} L ${centers[c2]} ${centers[r2]}`);
      path.dataset.lineIndex=i;
      linesSvg.appendChild(path);
    });
    Array.from(linesSvg.querySelectorAll('path')).forEach(p=>{
      const len=p.getTotalLength();
      p.style.strokeDasharray=len;
      p.style.strokeDashoffset=len;
    });
  }

  function renderDate(){
    const d=new Date();
    const days=['日','月','火','水','木','金','土'];
    document.getElementById('dateLabel').textContent=
      `本日 ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
  }
  renderDate();

  function showToast(){
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t=setTimeout(()=>toast.classList.remove('show'),1600);
  }

  function spawnConfetti(){
    const colors=['#B5392C','#2C3C63','#B0892F','#EAE2CF','#8a8070'];
    const container=document.createElement('div');
    container.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden';
    document.body.appendChild(container);
    for(let i=0;i<40;i++){
      const piece=document.createElement('span');
      piece.className='confetti-piece';
      const angle=Math.random()*Math.PI*2;
      const distance=90+Math.random()*170;
      const tx=Math.cos(angle)*distance;
      const ty=Math.sin(angle)*distance*0.6+100+Math.random()*120;
      const rot=(Math.random()*720-360)+'deg';
      const size=5+Math.random()*6;
      piece.style.width=size+'px';
      piece.style.height=(size*1.8)+'px';
      piece.style.background=colors[Math.floor(Math.random()*colors.length)];
      piece.style.borderRadius=Math.random()>0.5?'2px':'50%';
      piece.style.setProperty('--tx',tx+'px');
      piece.style.setProperty('--ty',ty+'px');
      piece.style.setProperty('--rot',rot);
      const dur=(0.9+Math.random()*0.6).toFixed(2);
      piece.style.animation=`confetti-burst ${dur}s cubic-bezier(.2,.7,.4,1) forwards`;
      container.appendChild(piece);
    }
    setTimeout(()=>container.remove(),1700);
  }

  function playCrackerSound(){
    try{
      const Ctx=window.AudioContext||window.webkitAudioContext;
      const ctx=new Ctx();
      if(ctx.state==='suspended') ctx.resume();
      const now=ctx.currentTime;
      const bufferSize=Math.floor(ctx.sampleRate*0.25);
      const buffer=ctx.createBuffer(1,bufferSize,ctx.sampleRate);
      const data=buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufferSize,2);
      const noise=ctx.createBufferSource();
      noise.buffer=buffer;
      const noiseFilter=ctx.createBiquadFilter();
      noiseFilter.type='highpass';
      noiseFilter.frequency.value=700;
      const noiseGain=ctx.createGain();
      noiseGain.gain.setValueAtTime(0.55,now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001,now+0.25);
      noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);
      [880,1320,1760].forEach((freq,idx)=>{
        const osc=ctx.createOscillator();
        osc.type='sine';
        osc.frequency.value=freq;
        const g=ctx.createGain();
        const t0=now+0.05+idx*0.07;
        g.gain.setValueAtTime(0.0001,t0);
        g.gain.exponentialRampToValueAtTime(0.16,t0+0.02);
        g.gain.exponentialRampToValueAtTime(0.0001,t0+0.18);
        osc.connect(g).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0+0.2);
      });
      setTimeout(()=>ctx.close(),800);
    }catch(err){}
  }

  function celebrate(){
    showToast();
    spawnConfetti();
    playCrackerSound();
  }

  function flashSaveStatus(text){
    if(!saveStatus) return;
    saveStatus.textContent=text;
    clearTimeout(flashSaveStatus._t);
    flashSaveStatus._t=setTimeout(()=>{saveStatus.textContent='';},1400);
  }

  function loadState(n){
    cellsData=Array.from({length:n*n},()=>({text:'',done:false}));
    try{
      const raw=localStorage.getItem(BINGO_DATA_KEY(n));
      if(raw){
        const parsed=JSON.parse(raw);
        if(Array.isArray(parsed)&&parsed.length===n*n){
          parsed.forEach((d,i)=>{cellsData[i].text=d.text||'';cellsData[i].done=!!d.done;});
        }
      }
    }catch(err){}
    rerenderAll({skipToast:true,skipSave:true});
  }

  function saveState(){
    try{
      localStorage.setItem(BINGO_DATA_KEY(gridSize),JSON.stringify(cellsData));
      flashSaveStatus('保存しました');
    }catch(err){
      flashSaveStatus('保存できませんでした');
    }
  }

  function checkLines(skipToast){
    const lines=buildLines(gridSize);
    let achievedCount=0;
    lines.forEach((combo,i)=>{
      const allDone=combo.every(idx=>cellsData[idx].done);
      const path=linesSvg.querySelector(`path[data-line-index="${i}"]`);
      if(!path) return;
      if(allDone){
        achievedCount++;
        if(!path.classList.contains('achieved')){
          path.classList.add('achieved');
          path.style.strokeDashoffset=0;
        }
      } else {
        if(path.classList.contains('achieved')){
          path.classList.remove('achieved');
          path.style.strokeDashoffset=path.getTotalLength();
        }
      }
    });
    bingoCountEl.textContent=achievedCount;
    if(!skipToast&&achievedCount>lastAchieved) celebrate();
    lastAchieved=achievedCount;
  }

  function fontSizeForGrid(n){ return n<=3?'13px':n===4?'11px':'9px'; }
  function stampSizeForGrid(n){ return n<=3?46:n===4?34:26; }

  function renderCell(idx){
    const n=gridSize;
    const data=cellsData[idx];
    const el=document.createElement('div');
    el.className='cell'+(data.done?' done':'')+(!data.text&&!data.done?' empty':'');
    el.dataset.idx=idx;
    const fs=fontSizeForGrid(n);
    const ss=stampSizeForGrid(n);

    if(!data.text&&!data.done){
      el.innerHTML=`<div class="empty-hint" style="font-size:${fs}"><span class="plus">+</span>入力</div>`;
      el.addEventListener('click',()=>startEdit(idx));
    } else {
      const textDiv=document.createElement('div');
      textDiv.className='cell-text';
      textDiv.style.fontSize=fs;
      textDiv.textContent=data.text;
      if(!data.done) textDiv.addEventListener('click',()=>startEdit(idx));
      el.appendChild(textDiv);

      if(data.done){
        const stamp=document.createElement('div');
        stamp.className='stamp-mark';
        stamp.style.width=ss+'px';
        stamp.style.height=ss+'px';
        stamp.style.marginTop=(-ss/2)+'px';
        stamp.style.fontSize=(ss*0.4)+'px';
        stamp.textContent='済';
        stamp.title='タップで取り消す';
        stamp.addEventListener('click',(e)=>{
          e.stopPropagation();
          data.done=false;
          rerenderAll();
        });
        el.appendChild(stamp);
      } else {
        const btn=document.createElement('button');
        btn.className='stamp-btn';
        btn.style.width=(ss*0.6)+'px';
        btn.style.height=(ss*0.6)+'px';
        btn.style.fontSize=(ss*0.24)+'px';
        btn.textContent='印';
        btn.title='完了として印を押す';
        btn.addEventListener('click',(e)=>{
          e.stopPropagation();
          data.done=true;
          rerenderAll();
        });
        el.appendChild(btn);
      }
    }
    return el;
  }

  function startEdit(idx){
    const data=cellsData[idx];
    const el=board.querySelector(`.cell[data-idx="${idx}"]`);
    el.className='cell';
    el.innerHTML='';
    const ta=document.createElement('textarea');
    ta.value=data.text;
    ta.placeholder='入力…';
    ta.maxLength=40;
    ta.style.fontSize=fontSizeForGrid(gridSize);
    el.appendChild(ta);
    ta.focus();
    ta.addEventListener('blur',()=>{
      data.text=ta.value.trim();
      rerenderAll();
    });
    ta.addEventListener('keydown',(e)=>{
      if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); ta.blur(); }
    });
  }

  function rerenderAll(opts){
    opts=opts||{};
    board.style.gridTemplateColumns=`repeat(${gridSize}, 1fr)`;
    board.innerHTML='';
    cellsData.forEach((_,idx)=>board.appendChild(renderCell(idx)));
    checkLines(opts.skipToast);
    if(!opts.skipSave) saveState();
  }

  function switchGridSize(n){
    gridSize=n;
    lastAchieved=0;
    document.querySelectorAll('.size-btn').forEach(btn=>{
      btn.classList.toggle('active',parseInt(btn.dataset.size)===n);
    });
    try{ localStorage.setItem(BINGO_SIZE_KEY,n); }catch(err){}
    buildSvgLines(n);
    loadState(n);
  }

  document.querySelectorAll('.size-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const n=parseInt(btn.dataset.size);
      if(n!==gridSize) switchGridSize(n);
    });
  });

  (function(){
    let resetPending = false;
    let resetTimer = null;
    const resetBtn = document.getElementById('resetBtn');
    resetBtn.addEventListener('click', () => {
      if(!resetPending){
        resetPending = true;
        resetBtn.textContent = '本当にリセット？（もう一度タップ）';
        resetBtn.style.borderColor = 'var(--vermillion)';
        resetBtn.style.color = 'var(--vermillion)';
        resetTimer = setTimeout(() => {
          resetPending = false;
          resetBtn.textContent = '盤面をリセット';
          resetBtn.style.borderColor = '';
          resetBtn.style.color = '';
        }, 3000);
      } else {
        clearTimeout(resetTimer);
        resetPending = false;
        resetBtn.textContent = '盤面をリセット';
        resetBtn.style.borderColor = '';
        resetBtn.style.color = '';
        cellsData.forEach(d=>{d.text='';d.done=false;});
        rerenderAll();
      }
    });
  })();

  (function initBingo(){
    let n=3;
    try{
      const saved=parseInt(localStorage.getItem(BINGO_SIZE_KEY));
      if([3,4,5].includes(saved)) n=saved;
    }catch(err){}
    switchGridSize(n);
  })();


  // ---- タブ切り替え ----
  const TAB_KEY = 'active-tab';
  const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
  const tabPanels = Array.from(document.querySelectorAll('.tab-panel'));

  function switchTab(name){
    tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === name));
    tabPanels.forEach(panel => panel.classList.toggle('active', panel.id === `panel-${name}`));
    try{ localStorage.setItem(TAB_KEY, name); }catch(err){}
  }

  tabButtons.forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  (function restoreTab(){
    try{
      const saved = localStorage.getItem(TAB_KEY);
      if(saved && tabButtons.some(btn => btn.dataset.tab === saved)){
        switchTab(saved);
      }
    }catch(err){}
  })();

  // ---- Daily / Weekly / Monthly / Yearly の共通ToDoリスト ----
  function createTodoList(key, listId, inputId, addBtnId, clearBtnId, countId){
    let items = [];
    const listEl = document.getElementById(listId);
    const countEl = document.getElementById(countId);
    const inputEl = document.getElementById(inputId);

    function load(){
      try{
        const raw = localStorage.getItem(key);
        if(raw){
          const parsed = JSON.parse(raw);
          if(Array.isArray(parsed)) items = parsed;
        }
      }catch(err){}
      render();
    }

    function save(){

  (function(){
    const STORAGE_KEY = 'deadline-list-data';
    let items = [];
    const listEl  = document.getElementById('deadline-list');
    const inputEl = document.getElementById('deadline-input');
    const dateEl  = document.getElementById('deadline-date');
    const countEl = document.getElementById('deadline-count');

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw){
          const parsed = JSON.parse(raw);
          if(Array.isArray(parsed)) items = parsed;
        }
      }catch(err){}
      render();
    }

    function save(){
      try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }catch(err){}
    }

    function dateLabel(dateStr){
      if(!dateStr) return '';
      const today = new Date(); today.setHours(0,0,0,0);
      const d = new Date(dateStr + 'T00:00:00');
      const diff = Math.round((d - today) / 86400000);
      if(diff < 0)  return { text: `${Math.abs(diff)}日超過`, cls: 'overdue' };
      if(diff === 0) return { text: '今日が期限', cls: 'soon' };
      if(diff <= 3)  return { text: `あと${diff}日`, cls: 'soon' };
      const m = d.getMonth()+1, day = d.getDate();
      return { text: `${m}/${day}まで`, cls: '' };
    }

    function render(){
      listEl.innerHTML = '';
      // 期限あり→日付昇順、期限なし→末尾
      const sorted = [...items].sort((a,b)=>{
        if(!a.date && !b.date) return 0;
        if(!a.date) return 1;
        if(!b.date) return -1;
        return a.date.localeCompare(b.date);
      });

      if(sorted.length === 0){
        const hint = document.createElement('div');
        hint.className = 'todo-empty-hint';
        hint.textContent = '入力欄から追加してください';
        listEl.appendChild(hint);
        countEl.textContent = '';
        return;
      }

      sorted.forEach(item => {
        const row = document.createElement('div');
        row.className = 'todo-row' + (item.done ? ' done' : '');

        const stampWrap = document.createElement('div');
        stampWrap.className = 'todo-stamp-wrap';
        if(item.done){
          const stamp = document.createElement('div');
          stamp.className = 'stamp-mark small';
          stamp.textContent = '済';
          stamp.addEventListener('click', () => { item.done=false; save(); render(); });
          stampWrap.appendChild(stamp);
        } else {
          const btn = document.createElement('button');
          btn.className = 'stamp-btn small';
          btn.textContent = '印';
          btn.addEventListener('click', () => { item.done=true; save(); render(); });
          stampWrap.appendChild(btn);
        }
        row.appendChild(stampWrap);

        const textWrap = document.createElement('div');
        textWrap.className = 'todo-text-wrap';

        const text = document.createElement('div');
        text.className = 'todo-text';
        text.textContent = item.text;
        textWrap.appendChild(text);

        if(item.date && !item.done){
          const info = dateLabel(item.date);
          const chip = document.createElement('span');
          chip.className = 'deadline-chip' + (info.cls ? ' '+info.cls : '');
          chip.textContent = info.text;
          textWrap.appendChild(chip);
        }
        row.appendChild(textWrap);

        const del = document.createElement('button');
        del.className = 'todo-del';
        del.textContent = '×';
        del.addEventListener('click', () => {
          items = items.filter(i => i.id !== item.id);
          save(); render();
        });
        row.appendChild(del);

        listEl.appendChild(row);
      });

      const doneCount = items.filter(i=>i.done).length;
      countEl.textContent = items.length ? `${doneCount}/${items.length} 完了` : '';
    }

    function addItem(){
      const text = inputEl.value.trim();
      if(!text) return;
      items.push({
        id: Date.now()+'-'+Math.random().toString(36).slice(2),
        text,
        date: dateEl.value || '',
        done: false
      });
      save(); render();
      inputEl.value = '';
      dateEl.value = '';
      inputEl.focus();
    }

    document.getElementById('deadline-add').addEventListener('click', addItem);
    inputEl.addEventListener('keydown', e => {
      if(e.key==='Enter'){ e.preventDefault(); addItem(); }
    });

    (function(){
      let pending=false, timer=null;
      const btn = document.getElementById('deadline-clear');
      btn.addEventListener('click', ()=>{
        if(!pending){
          pending=true;
          btn.textContent='もう一度タップで確定';
          btn.style.color='var(--vermillion)';

        } else {
          clearTimeout(timer); pending=false;
          btn.textContent='リストをクリア'; btn.style.color='';
          items=[]; save(); render();
        }
      });
    })();

    load();
  })();

  // ---- データの書き出し / 読み込み(Chrome→Safariなど、ブラウザ間の移行用) ----
  (function(){
    const ALL_KEYS = [
      'bingo-size',
      'board-state-3x3','board-state-4x4','board-state-5x5',
      'active-tab',
      'daily-list-data','weekly-list-data','monthly-list-data','yearly-list-data',
      'numbered-list-data',
      'someday-list-data',
      'waiting-list-data',
      'deadline-list-data',
      'entame-list-data'
    ];

    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const area = document.getElementById('backupArea');
    const status = document.getElementById('backupStatus');

    exportBtn.addEventListener('click', () => {
      const data = {};
      ALL_KEYS.forEach(k => {
        const v = localStorage.getItem(k);
        if(v !== null) data[k] = v;
      });
      const json = JSON.stringify(data);
      area.value = json;
      area.style.display = 'block';
      area.focus();
      area.select();
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(json).then(() => {
          status.textContent = 'コピーしました。移したい方のブラウザで貼り付けてください';
        }).catch(() => {
          status.textContent = '選択済みです。このまま手動でコピーしてください';
        });
      } else {
        status.textContent = '選択済みです。このまま手動でコピーしてください';
      }
    });

    importBtn.addEventListener('click', () => {
      if(area.style.display !== 'block' || !area.value.trim()){
        area.style.display = 'block';
        area.value = '';
        area.focus();
        status.textContent = '貼り付けたら、もう一度「データを読み込む」を押してください';
        return;
      }
      try{
        const data = JSON.parse(area.value.trim());
        Object.keys(data).forEach(k => {
          if(ALL_KEYS.includes(k)) localStorage.setItem(k, data[k]);
        });
        status.textContent = '読み込みました。画面を更新します…';
        setTimeout(() => location.reload(), 800);
      }catch(err){
        status.textContent = '読み込みに失敗しました。データが正しく貼り付けられているか確認してください';
      }
    });
  })();
