<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>やることビンゴ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#2C3C63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="やることビンゴ">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="manifest" id="manifestLink">
<script>
  (function(){
    const iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">'
      + '<rect width="200" height="200" rx="36" fill="#2C3C63"/>'
      + '<circle cx="100" cy="100" r="58" fill="none" stroke="#B5392C" stroke-width="10"/>'
      + '<text x="100" y="120" font-family="serif" font-size="56" fill="#B5392C" text-anchor="middle" font-weight="700">印</text>'
      + '</svg>';
    const iconDataUri = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
    document.getElementById('appleIcon').setAttribute('href', iconDataUri);

    const manifest = {
      name: 'やることビンゴ',
      short_name: 'ビンゴ',
      start_url: '.',
      display: 'standalone',
      background_color: '#F7F2E7',
      theme_color: '#2C3C63',
      icons: [{ src: iconDataUri, sizes: '200x200', type: 'image/svg+xml' }]
    };
    const manifestUri = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
    document.getElementById('manifestLink').setAttribute('href', manifestUri);

    if('serviceWorker' in navigator){
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {
          // プレビュー環境やfile://では登録できない。実際にホスティングした際に有効になる。
        });
      });
    }
  })();
</script>
<style>
  :root{
    --paper:#F7F2E7;
    --paper-dark:#EAE2CF;
    --ink:#272320;
    --ink-soft:#6b6258;
    --indigo:#2C3C63;
    --indigo-soft:#5b6c92;
    --vermillion:#B5392C;
    --vermillion-soft:#c97b6e;
    --gold:#B0892F;
    --line:#d8cdb2;
  }

  *{box-sizing:border-box;}

  html, body{
    overscroll-behavior:none;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, rgba(176,137,47,0.06), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(44,60,99,0.06), transparent 40%),
      var(--paper);
    font-family:'Zen Kaku Gothic New', sans-serif;
    color:var(--ink);
    display:flex;
    justify-content:center;
    padding:32px 16px 60px;
  }

  .app{
    width:100%;
    max-width:480px;
  }

  header{
    margin-bottom:22px;
  }

  .header-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:6px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    color:var(--ink-soft);
  }

  .bingo-badge{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--vermillion);
    border:1px solid var(--vermillion-soft);
    border-radius:999px;
    padding:4px 10px 4px 8px;
    background:rgba(181,57,44,0.06);
  }

  .bingo-badge .count{
    font-size:15px;
    font-weight:700;
  }

  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:30px;
    margin:2px 0 8px;
    letter-spacing:0.02em;
  }

  .subtitle{
    font-size:13px;
    line-height:1.7;
    color:var(--ink-soft);
    margin:0;
  }

  .board-wrap{
    position:relative;
    margin-top:24px;
  }

  .board{
    position:relative;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:10px;
    aspect-ratio:1/1;
  }

  .lines-overlay{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
  }

  .lines-overlay path{
    fill:none;
    stroke:var(--indigo);
    stroke-width:1.6;
    stroke-linecap:round;
    opacity:0;
    transition:stroke-dashoffset 0.65s cubic-bezier(.2,.8,.2,1), opacity 0.2s ease;
  }

  .lines-overlay path.achieved{
    opacity:0.85;
  }

  .cell{
    position:relative;
    border-radius:8px;
    background:#fffdf8;
    border:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    transition:border-color 0.25s ease, background 0.25s ease;
  }

  .cell.empty{
    background:transparent;
    border:1.5px dashed var(--line);
    align-items:center;
    justify-content:center;
    cursor:text;
    color:var(--ink-soft);
  }

  .cell.empty:hover{
    border-color:var(--indigo-soft);
    color:var(--indigo);
  }

  .cell.empty:active, .cell-text:active{
    transform:scale(0.97);
  }

  .empty-hint{
    font-size:12px;
    text-align:center;
    line-height:1.6;
    padding:8px;
    pointer-events:none;
  }

  .empty-hint .plus{
    font-size:20px;
    display:block;
    margin-bottom:2px;
    font-family:'JetBrains Mono', monospace;
  }

  .cell textarea{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
    resize:none;
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:13px;
    line-height:1.55;
    padding:10px;
    color:var(--ink);
    outline:none;
  }

  .cell-text{
    flex:1;
    padding:10px 10px 6px;
    font-size:13px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
    cursor:text;
  }

  .cell.done .cell-text{
    color:var(--ink-soft);
  }

  .stamp-btn{
    align-self:flex-end;
    margin:0 6px 6px auto;
    width:26px;
    height:26px;
    border-radius:50%;
    border:1.4px solid var(--indigo-soft);
    background:transparent;
    color:var(--indigo-soft);
    font-size:11px;
    font-family:'JetBrains Mono', monospace;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }

  .stamp-btn:hover{
    border-color:var(--indigo);
    color:var(--indigo);
    transform:scale(1.08);
  }

  .stamp-btn:active{
    transform:scale(0.88);
  }

  .stamp-mark{
    position:absolute;
    top:50%;
    right:10px;
    width:46px;
    height:46px;
    margin-top:-23px;
    border:2.5px solid var(--vermillion);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--vermillion);
    font-family:'Shippori Mincho', serif;
    font-size:18px;
    font-weight:700;
    transform:rotate(-10deg) scale(0);
    opacity:0;
    transition:transform 0.32s cubic-bezier(.34,1.56,.64,1), opacity 0.2s ease;
    cursor:pointer;
    background:rgba(181,57,44,0.04);
  }

  .cell.done .stamp-mark{
    transform:rotate(-10deg) scale(1);
    opacity:1;
  }

  .stamp-mark:active{
    transform:rotate(-10deg) scale(0.9) !important;
  }

  .cell.done .stamp-btn{
    display:none;
  }

  .cell.done{
    border-color:#e2d9be;
  }

  footer{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }

  .reset-btn{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-soft);
    background:none;
    border:1px solid var(--line);
    border-radius:999px;
    padding:8px 18px;
    cursor:pointer;
    transition:border-color 0.2s ease, color 0.2s ease;
  }

  .reset-btn:hover{
    border-color:var(--vermillion-soft);
    color:var(--vermillion);
  }

  .reset-btn:active{
    transform:scale(0.96);
  }

  .save-note{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.75;
    text-align:center;
    min-height:14px;
  }

  .install-note{
    font-size:11px;
    color:var(--ink-soft);
    opacity:0.6;
    text-align:center;
    max-width:320px;
    line-height:1.6;
  }

  .toast{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--indigo);
    color:var(--paper);
    font-family:'Shippori Mincho', serif;
    font-size:14px;
    padding:10px 22px;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.3s ease, transform 0.3s ease;
    letter-spacing:0.04em;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .confetti-piece{
    position:absolute;
    left:50%;
    top:38%;
    pointer-events:none;
  }

  @keyframes confetti-burst{
    0%{ transform:translate(0,0) rotate(0deg); opacity:1; }
    100%{ transform:translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-row">
      <span class="eyebrow" id="dateLabel"></span>
      <div class="bingo-badge">ビンゴ <span class="count" id="bingoCount">0</span></div>
    </div>
    <h1>やることビンゴ</h1>
    <p class="subtitle">マスに予定を書き込み、終わったら印を押す。縦・横・斜めが揃うとビンゴ。</p>
  </header>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <svg class="lines-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" id="linesSvg"></svg>
  </div>

  <footer>
    <button class="reset-btn" id="resetBtn">盤面をリセット</button>
    <p class="save-note"><span id="saveStatus"></span></p>
    <p class="install-note">スマホのChromeで開いて、右上のメニューから「ホーム画面に追加」を選ぶとアプリのように開けます</p>
  </footer>
</div>

<div class="toast" id="toast">ビンゴ!</div>

<script>
  const STORAGE_KEY = 'board-state';
  const cellsData = Array.from({length:9}, () => ({text:'', done:false}));
  let lastAchieved = 0;

  const board = document.getElementById('board');
  const bingoCountEl = document.getElementById('bingoCount');
  const toast = document.getElementById('toast');
  const linesSvg = document.getElementById('linesSvg');
  const saveStatus = document.getElementById('saveStatus');

  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function lineCoords(combo){
    const centers = [16.67, 50, 83.33];
    const [a,,c] = combo;
    const r0 = Math.floor(a/3), col0 = a%3;
    const r2 = Math.floor(c/3), col2 = c%3;
    return {
      x1: centers[col0], y1: centers[r0],
      x2: centers[col2], y2: centers[r2]
    };
  }

  LINES.forEach((combo, i) => {
    const {x1,y1,x2,y2} = lineCoords(combo);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
    path.dataset.lineIndex = i;
    linesSvg.appendChild(path);
  });

  function setupPathLength(path){
    const len = path.getTotalLength();
    path.style.strokeDasharray = len;
    path.style.strokeDashoffset = len;
  }
  Array.from(linesSvg.querySelectorAll('path')).forEach(setupPathLength);

  function renderDate(){
    const d = new Date();
    const days = ['日','月','火','水','木','金','土'];
    document.getElementById('dateLabel').textContent =
      `本日 ${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]})`;
  }
  renderDate();

  function showToast(){
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1600);
  }

  function spawnConfetti(){
    const colors = ['#B5392C','#2C3C63','#B0892F','#EAE2CF','#8a8070'];
    const container = document.createElement('div');
    container.style.position = 'fixed';
    container.style.inset = '0';
    container.style.pointerEvents = 'none';
    container.style.zIndex = '9999';
    container.style.overflow = 'hidden';
    document.body.appendChild(container);

    const count = 40;
    for(let i=0;i<count;i++){
      const piece = document.createElement('span');
      piece.className = 'confetti-piece';
      const angle = Math.random() * Math.PI * 2;
      const distance = 90 + Math.random() * 170;
      const tx = Math.cos(angle) * distance;
      const ty = Math.sin(angle) * distance * 0.6 + 100 + Math.random() * 120;
      const rot = (Math.random() * 720 - 360) + 'deg';
      const size = 5 + Math.random() * 6;
      piece.style.width = size + 'px';
      piece.style.height = (size * 1.8) + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%';
      piece.style.setProperty('--tx', tx + 'px');
      piece.style.setProperty('--ty', ty + 'px');
      piece.style.setProperty('--rot', rot);
      const dur = (0.9 + Math.random() * 0.6).toFixed(2);
      piece.style.animation = `confetti-burst ${dur}s cubic-bezier(.2,.7,.4,1) forwards`;
      container.appendChild(piece);
    }
    setTimeout(() => container.remove(), 1700);
  }

  function playCrackerSound(){
    try{
      const Ctx = window.AudioContext || window.webkitAudioContext;
      const ctx = new Ctx();
      if(ctx.state === 'suspended') ctx.resume();
      const now = ctx.currentTime;

      // バン!というノイズの破裂音
      const bufferSize = Math.floor(ctx.sampleRate * 0.25);
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 700;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.55, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
      noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);
      noise.start(now);

      // 続く軽快な音(紙吹雪が舞う感じ)
      [880, 1320, 1760].forEach((freq, idx) => {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const g = ctx.createGain();
        const t0 = now + 0.05 + idx * 0.07;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.16, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
        osc.connect(g).connect(ctx.destination);
        osc.start(t0);
        osc.stop(t0 + 0.2);
      });

      setTimeout(() => ctx.close(), 800);
    }catch(err){
      // 音声に対応していない環境では無視する
    }
  }

  function celebrate(){
    showToast();
    spawnConfetti();
    playCrackerSound();
  }

  function flashSaveStatus(text){
    if(!saveStatus) return;
    saveStatus.textContent = text;
    clearTimeout(flashSaveStatus._t);
    flashSaveStatus._t = setTimeout(() => { saveStatus.textContent = ''; }, 1400);
  }

  async function loadState(){
    try{
      const result = await window.storage.get(STORAGE_KEY, false);
      if(result && result.value){
        const parsed = JSON.parse(result.value);
        if(Array.isArray(parsed) && parsed.length === 9){
          parsed.forEach((d, i) => { cellsData[i].text = d.text || ''; cellsData[i].done = !!d.done; });
        }
      }
    }catch(err){
      // 初回起動時など、保存データがまだ無い場合はここに来る
    }
    rerenderAll({skipToast:true, skipSave:true});
  }

  async function saveState(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(cellsData), false);
      flashSaveStatus('保存しました');
    }catch(err){
      flashSaveStatus('保存できませんでした');
    }
  }

  function checkLines(skipToast){
    let achievedCount = 0;
    LINES.forEach((combo, i) => {
      const allDone = combo.every(idx => cellsData[idx].done);
      const path = linesSvg.querySelector(`path[data-line-index="${i}"]`);
      if(allDone){
        achievedCount++;
        if(!path.classList.contains('achieved')){
          path.classList.add('achieved');
          path.style.strokeDashoffset = 0;
        }
      } else {
        if(path.classList.contains('achieved')){
          path.classList.remove('achieved');
          const len = path.getTotalLength();
          path.style.strokeDashoffset = len;
        }
      }
    });
    bingoCountEl.textContent = achievedCount;
    if(!skipToast && achievedCount > lastAchieved) celebrate();
    lastAchieved = achievedCount;
  }

  function renderCell(idx){
    const data = cellsData[idx];
    const el = document.createElement('div');
    el.className = 'cell' + (data.done ? ' done' : '') + (!data.text && !data.done ? ' empty' : '');
    el.dataset.idx = idx;

    if(!data.text && !data.done){
      el.innerHTML = `<div class="empty-hint"><span class="plus">+</span>予定を入力</div>`;
      el.addEventListener('click', () => startEdit(idx));
    } else {
      const textDiv = document.createElement('div');
      textDiv.className = 'cell-text';
      textDiv.textContent = data.text;
      if(!data.done){
        textDiv.addEventListener('click', () => startEdit(idx));
      }
      el.appendChild(textDiv);

      if(data.done){
        const stamp = document.createElement('div');
        stamp.className = 'stamp-mark';
        stamp.textContent = '済';
        stamp.title = 'タップで取り消す';
        stamp.addEventListener('click', (e) => {
          e.stopPropagation();
          data.done = false;
          rerenderAll();
        });
        el.appendChild(stamp);
      } else {
        const btn = document.createElement('button');
        btn.className = 'stamp-btn';
        btn.textContent = '印';
        btn.title = '完了として印を押す';
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          data.done = true;
          rerenderAll();
        });
        el.appendChild(btn);
      }
    }
    return el;
  }

  function startEdit(idx){
    const data = cellsData[idx];
    const el = board.querySelector(`.cell[data-idx="${idx}"]`);
    el.className = 'cell';
    el.innerHTML = '';
    const ta = document.createElement('textarea');
    ta.value = data.text;
    ta.placeholder = '例: 資料を提出する';
    ta.maxLength = 40;
    el.appendChild(ta);
    ta.focus();
    ta.addEventListener('blur', () => {
      data.text = ta.value.trim();
      rerenderAll();
    });
    ta.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey){
        e.preventDefault();
        ta.blur();
      }
    });
  }

  function rerenderAll(opts){
    opts = opts || {};
    board.innerHTML = '';
    cellsData.forEach((_, idx) => board.appendChild(renderCell(idx)));
    checkLines(opts.skipToast);
    if(!opts.skipSave) saveState();
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    if(confirm('盤面をリセットしますか?入力した内容は消えます。')){
      cellsData.forEach(d => { d.text = ''; d.done = false; });
      rerenderAll();
    }
  });

  loadState();
</script>

</body>
</html>
